# prj.conf — SmartHealth nRF52840 (MAX30102 + ADS1115 thermistor)

CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

CONFIG_I2C=y
CONFIG_GPIO=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

CONFIG_MAIN_STACK_SIZE=4096

# Floating-point support for Steinhart-Hart temperature equation (log())
CONFIG_FPU=y
CONFIG_FPU_SHARING=y
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=n
