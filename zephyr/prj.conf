CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_MAIN_STACK_SIZE=2048

# Flash at 0x30000 — Particle bootloader user-app space
CONFIG_FLASH_LOAD_OFFSET=0x30000
CONFIG_FLASH_LOAD_SIZE=0xC0000

# USB CDC-ACM console — serial output over USB without extra hardware
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_PRODUCT="Zephyr MAX30102"
CONFIG_USB_DEVICE_VID=0x2B04
CONFIG_USB_DEVICE_PID=0x000B
